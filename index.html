
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Risk Prediction - Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            background: rgba(255,255,255,0.9);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }

        .demo-box {
            margin-top: 25px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: left;
        }

        .demo-box p {
            margin: 5px 0;
        }

    </style>
</head>
<body>

    <div class="container">

        <div class="login-card">

            <div class="logo">🔥</div>

            <h1>Fire Risk Prediction</h1>

            <p class="subtitle">
                AI-Based Fire Detection & Risk Analysis System
            </p>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter Username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <button class="login-btn" onclick="login()">
                Login
            </button>
<button onclick="signup()">Sign Up</button>
            <div class="footer-text">
                Secure Fire Monitoring Dashboard
            </div>

            <div class="demo-box">
                <p><strong>Demo User:</strong> user</p>
                <p><strong>Password:</strong> 1234</p>
                <br>
            </div>

        </div>

    </div>

    <script>
function signup() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(username === "" || password === "") {
        alert("Enter username and password");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    const existingUser = users.find(user => user.username === username);

    if(existingUser) {
        alert("Username already exists");
        return;
    }

    users.push({
        username: username,
        password: password
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Signup Successful");
}

function login() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    const validUser = users.find(
        user =>
            user.username === username &&
            user.password === password
    );

    if(validUser) {

        localStorage.setItem("currentUser", username);

        window.location.href = "dashboard.html";

    } else {

        alert("Invalid Username or Password");
    }
}

    </script>

</body>
</html>
